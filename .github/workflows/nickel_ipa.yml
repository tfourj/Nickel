name: Build Unsigned IPA

on:
  push:
    branches: [main]
    paths:
      - 'Nickel.xcodeproj/project.pbxproj'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download SwiftFFmpeg-iOS
      uses: robinraju/release-downloader@v1
      with:
        repository: tfourj/SwiftFFmpeg-iOS
        latest: true
        fileName: SwiftFFmpeg-iOS.zip
        out-file-path: swiftffmpeg-download
        extract: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install SwiftFFmpeg-iOS
      run: |
        set -euo pipefail

        SOURCE_DIR=""
        TARGET_DIR="$GITHUB_WORKSPACE/Frameworks/SwiftFFmpeg-iOS"
        EXTRACT_DIR="$GITHUB_WORKSPACE/swiftffmpeg-download"

        if [ -d "$EXTRACT_DIR/SwiftFFmpeg-iOS" ]; then
          SOURCE_DIR="$EXTRACT_DIR/SwiftFFmpeg-iOS"
        else
          SOURCE_DIR=$(find "$EXTRACT_DIR" -maxdepth 2 -type f -name "Package.swift" -exec dirname {} \; | head -n 1)
        fi

        if [ -z "$SOURCE_DIR" ] || [ ! -d "$SOURCE_DIR" ]; then
          echo "Could not locate extracted SwiftFFmpeg-iOS folder."
          find "$EXTRACT_DIR" -maxdepth 3 -print
          exit 1
        fi

        rm -rf "$TARGET_DIR"
        mkdir -p "$(dirname "$TARGET_DIR")"
        cp -R "$SOURCE_DIR" "$TARGET_DIR"

        echo "Installed SwiftFFmpeg-iOS:"
        ls -la "$TARGET_DIR"

    - name: Set up Xcode 26.2
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.2"

    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Show Swift Version
      run: swift --version

    - name: Make script executable
      run: chmod +x build_ipa.sh

    - name: Build IPA
      run: ./build_ipa.sh

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: Nickel-unsigned-IPA
        path: build/*.ipa
